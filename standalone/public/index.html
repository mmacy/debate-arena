<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Debate Arena</title>
<meta name="color-scheme" content="dark" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='9' fill='%2310121b'/%3E%3Cpath d='M5 9 L18 20 L5 31 Z' fill='%233fd2f2'/%3E%3Cpath d='M35 9 L22 20 L35 31 Z' fill='%23ff5e57'/%3E%3Cpath d='M20 13 L23.5 20 L20 27 L16.5 20 Z' fill='%23f1c34c'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Mono:wght@400;700&display=swap"
  rel="stylesheet" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="glow glow-pro" aria-hidden="true"></div>
  <div class="glow glow-con" aria-hidden="true"></div>

  <div id="app">
    <header class="masthead">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="40" height="40">
            <path class="m-pro" d="M3 8 L17 20 L3 32 Z" />
            <path class="m-con" d="M37 8 L23 20 L37 32 Z" />
            <path class="m-judge" d="M20 12 L24 20 L20 28 L16 20 Z" />
          </svg>
        </span>
        <span class="brand-text">
          <h1>Debate&nbsp;Arena</h1>
          <span class="tagline">Two models enter — one verdict leaves</span>
        </span>
      </div>
      <div id="statusPill" class="status idle" role="status" aria-live="polite">
        <span class="status-dot"></span><span class="status-text">Idle</span>
      </div>
    </header>

    <section class="setup" aria-label="Match setup">
      <div class="resolution">
        <label for="topic" class="overline">The resolution</label>
        <textarea id="topic" rows="2" spellcheck="true"
          placeholder="State the motion — e.g. Remote work is better for software teams than the office."></textarea>
      </div>

      <div class="matchup">
        <div class="corner pro" data-side="pro">
          <div class="corner-head">
            <span class="corner-kicker"><span class="dot pro"></span>Affirmative</span>
            <span class="corner-role">Pro</span>
            <span class="win-pill" id="proWin" hidden>Victor</span>
          </div>
          <div class="select-wrap">
            <select id="proModel" aria-label="Pro debater model"><option>Loading…</option></select>
          </div>
        </div>

        <div class="center">
          <div class="versus" aria-hidden="true">vs</div>
          <button id="swapBtn" class="swap-btn" type="button"
            title="Swap the Pro and Con models" aria-label="Swap the Pro and Con models">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 4 L3 8 L7 12" /><path d="M3 8 H17" />
              <path d="M17 20 L21 16 L17 12" /><path d="M21 16 H7" />
            </svg>
          </button>
          <div class="judge-slot">
            <label for="judgeModel" class="overline"><span class="dot judge"></span>Presiding judge
              <span class="win-pill draw" id="drawWin" hidden>Draw</span></label>
            <div class="select-wrap judge">
              <select id="judgeModel" aria-label="Judge model"><option>Loading…</option></select>
            </div>
          </div>
        </div>

        <div class="corner con" data-side="con">
          <div class="corner-head">
            <span class="win-pill" id="conWin" hidden>Victor</span>
            <span class="corner-role">Con</span>
            <span class="corner-kicker">Negative<span class="dot con"></span></span>
          </div>
          <div class="select-wrap">
            <select id="conModel" aria-label="Con debater model"><option>Loading…</option></select>
          </div>
        </div>
      </div>

      <div class="controls">
        <div class="rounds-field">
          <label for="rounds" class="overline">Rebuttal rounds</label>
          <div class="select-wrap small">
            <select id="rounds">
              <option value="1">1 round</option>
              <option value="2">2 rounds</option>
              <option value="3">3 rounds</option>
            </select>
          </div>
        </div>
        <div class="control-actions">
          <button id="startBtn" class="btn primary">Start debate</button>
          <button id="stopBtn" class="btn danger" hidden>Stop</button>
          <button id="refreshBtn" class="btn ghost" type="button" title="Reload the model list from Ollama">
            Reload models
          </button>
        </div>
        <span id="setupMsg" class="setup-msg" aria-live="polite"></span>
      </div>
    </section>

    <main id="stage" class="stage">
      <div id="empty" class="empty">
        <div class="empty-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="60" height="60" fill="none" stroke="currentColor"
            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="26" y="8" width="12" height="26" rx="6" />
            <path d="M18 28 a14 14 0 0 0 28 0" /><path d="M32 42 V52" /><path d="M22 54 H42" />
          </svg>
        </div>
        <p class="empty-title">The floor is open.</p>
        <p class="empty-sub">Set a resolution, choose your corners, and call the match to order.</p>
      </div>
    </main>

    <footer id="saveBar" class="savebar" hidden>
      <div class="save-field">
        <span class="save-prefix">debates&#47;</span>
        <input id="filename" class="filename" type="text" spellcheck="false" aria-label="File name" />
        <span class="save-suffix">.md</span>
      </div>
      <button id="saveBtn" class="btn primary">Save transcript</button>
      <button id="copyBtn" class="btn ghost">Copy Markdown</button>
      <span id="saveResult" class="save-result" aria-live="polite"></span>
    </footer>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
